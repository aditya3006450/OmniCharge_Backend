<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OmniCharge</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { background: #f1f5f9; font-family: 'Segoe UI', sans-serif; margin: 0; }
    .sidebar { width: 240px; min-height: 100vh; background: #1e3a5f; }
    .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .btn-primary { background: #1e3a5f; color: white; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn-primary:hover { background: #2d5494; }
    .btn-secondary { background: #e8f0fe; color: #1e3a5f; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .input { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; transition: border 0.2s; }
    .input:focus { border-color: #1e3a5f; }
    .badge-success { background: #dcfce7; color: #166534; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
    .badge-pending { background: #fef9c3; color: #854d0e; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
    .badge-failed  { background: #fee2e2; color: #991b1b; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
    .plan-card { border: 2px solid #e2e8f0; border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.2s; }
    .plan-card:hover { border-color: #1e3a5f; background: #f0f4ff; }
    .plan-card.selected { border-color: #1e3a5f; background: #e8f0fe; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: #94a3b8; cursor: pointer; border-radius: 8px; margin: 2px 8px; transition: all 0.2s; font-size: 14px; }
    .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: white; font-weight: 600; }
    .stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .payment-option { border: 2px solid #e2e8f0; border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .payment-option:hover { border-color: #1e3a5f; }
    .payment-option.selected { border-color: #1e3a5f; background: #e8f0fe; }
    .tab { padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 500; color: #64748b; transition: all 0.2s; }
    .tab.active { background: #1e3a5f; color: white; }
    .alert-error { background: #fee2e2; color: #991b1b; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; }
    .alert-success { background: #dcfce7; color: #166534; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
const getApiBase = () => {
  if (window.API_URL) return window.API_URL;
  const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
  return isLocalhost ? 'http://localhost:8080' : window.location.origin;
};
const API = getApiBase();

// ── API calls ─────────────────────────────────────────────
const api = {
  register: (data) => fetch(`${API}/api/v1/users/register`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
  }).then(r=>r.json()),

  login: (data) => fetch(`${API}/api/v1/users/login`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
  }).then(r=>r.json()),

  getOperators: (token) => fetch(`${API}/api/v1/operators`, {
    headers:{'Authorization':`Bearer ${token}`}
  }).then(r=>r.json()),

  getPlans: (operatorId, token) => fetch(`${API}/api/v1/operators/${operatorId}/plans`, {
    headers:{'Authorization':`Bearer ${token}`}
  }).then(r=>r.json()),

  initiateRecharge: (data, token) => fetch(`${API}/api/v1/recharges/initiate`, {
    method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
    body:JSON.stringify(data)
  }).then(r=>r.json()),

  processPayment: (data, token) => fetch(`${API}/api/v1/payments/process`, {
    method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
    body:JSON.stringify(data)
  }).then(r=>r.json()),

  getRecharges: (userId, token) => fetch(`${API}/api/v1/recharges/user/${userId}`, {
    headers:{'Authorization':`Bearer ${token}`}
  }).then(r=>r.json()),

  getTransactions: (userId, token) => fetch(`${API}/api/v1/payments/user/${userId}`, {
    headers:{'Authorization':`Bearer ${token}`}
  }).then(r=>r.json()),

  getProfile: (token) => fetch(`${API}/api/v1/users/profile`, {
    headers:{'Authorization':`Bearer ${token}`}
  }).then(r=>r.json()),

  getAllUsers: (token) => fetch(`${API}/api/v1/users/all`, {
    headers:{'Authorization':`Bearer ${token}`}
}).then(r=>r.json()),

getAllRecharges: (token) => fetch(`${API}/api/v1/recharges/all`, {
    headers:{'Authorization':`Bearer ${token}`}
}).then(r=>r.json()),

getAllPayments: (token) => fetch(`${API}/api/v1/payments/all`, {
    headers:{'Authorization':`Bearer ${token}`}
}).then(r=>r.json()),

getAllOperators: (token) => fetch(`${API}/api/v1/operators`, {
    headers:{'Authorization':`Bearer ${token}`}
}).then(r=>r.json()),

createOperator: (data, token) => fetch(`${API}/api/v1/operators`, {
    method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
    body:JSON.stringify(data)
}).then(r=>r.json()),

createPlan: (operatorId, data, token) => fetch(`${API}/api/v1/operators/${operatorId}/plans`, {
    method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
    body:JSON.stringify(data)
}).then(r=>r.json()),
};

// ── Icons ─────────────────────────────────────────────────
const Icon = ({name}) => {
  const icons = {
    home:'🏠', recharge:'📱', history:'📋', payment:'💳',
    profile:'👤', logout:'🚪', operators:'📡', success:'✅',
    failed:'❌', pending:'⏳', rupee:'₹', search:'🔍',
    airtel:'🔴', jio:'🔵', vi:'🟡', back:'←'
  };
  return <span style={{fontSize:16}}>{icons[name]||'•'}</span>;
};

// ── Auth Screen ───────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [tab, setTab] = useState('login');
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({
    email:'', password:'', firstName:'', lastName:'', phone:'', otp:''
  });
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');
  const [loading, setLoading] = useState(false);
  const [timer, setTimer] = useState(0);

  useEffect(()=>{
    if(timer>0) {
      const t = setTimeout(()=>setTimer(timer-1), 1000);
      return ()=>clearTimeout(t);
    }
  },[timer]);

  const sendOtp = async () => {
    setError(''); setSuccess(''); setLoading(true);
    try {
      const res = await fetch(`${API}/api/v1/users/send-otp`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email: form.email})
      }).then(r=>r.json());

      if(res.message) {
        setSuccess(`OTP sent to ${form.email}`);
        setStep(2);
        setTimer(120);
      } else {
        setError(res.error || res.message || 'Failed to send OTP');
      }
    } catch(e) { setError('Connection error'); }
    setLoading(false);
  };

  const verifyAndRegister = async () => {
    setError(''); setLoading(true);
    try {
      // First verify OTP
      const verifyRes = await fetch(`${API}/api/v1/users/verify-otp`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email: form.email, otp: form.otp})
      }).then(r=>r.json());

      if(!verifyRes.message) {
        setError(verifyRes.error || 'Invalid OTP');
        setLoading(false);
        return;
      }

      // Then register
      const res = await fetch(`${API}/api/v1/users/register`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          email: form.email, password: form.password,
          firstName: form.firstName, lastName: form.lastName,
          phone: form.phone
        })
      }).then(r=>r.json());

      if(res.token) onLogin(res);
      else setError(res.error || 'Registration failed');
    } catch(e) { setError('Connection error'); }
    setLoading(false);
  };

  const handleLogin = async () => {
    setError(''); setLoading(true);
    try {
      const res = await fetch(`${API}/api/v1/users/login`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email: form.email, password: form.password})
      }).then(r=>r.json());
      if(res.token) onLogin(res);
      else setError(res.error || res.message || 'Login failed');
    } catch(e) { setError('Connection error'); }
    setLoading(false);
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',
      justifyContent:'center',background:'linear-gradient(135deg,#1e3a5f 0%,#2d5494 100%)'}}>
      <div className="card" style={{width:440,padding:36}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:32,fontWeight:700,color:'#1e3a5f'}}>⚡ OmniCharge</div>
          <div style={{color:'#64748b',fontSize:14,marginTop:4}}>Mobile Recharge Platform</div>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:24,background:'#f1f5f9',
          borderRadius:10,padding:4}}>
          {['login','register'].map(t=>(
            <button key={t} className={`tab ${tab===t?'active':''}`}
              style={{flex:1,border:'none'}}
              onClick={()=>{setTab(t);setError('');setSuccess('');setStep(1);}}>
              {t==='login'?'Login':'Register'}
            </button>
          ))}
        </div>

        {error && <div className="alert-error">{error}</div>}
        {success && <div className="alert-success">{success}</div>}

        {/* ── Login ── */}
        {tab==='login' && (
          <>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>Email</label>
              <input className="input" style={{marginTop:4}} type="email"
                placeholder="you@email.com" value={form.email}
                onChange={e=>setForm({...form,email:e.target.value})}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>Password</label>
              <input className="input" style={{marginTop:4}} type="password"
                placeholder="••••••••" value={form.password}
                onChange={e=>setForm({...form,password:e.target.value})}/>
            </div>
            <button className="btn-primary" style={{width:'100%',padding:12,fontSize:15}}
              onClick={handleLogin} disabled={loading}>
              {loading?'Please wait...':'Login'}
            </button>
          </>
        )}

        {/* ── Register Step 1: Details + Send OTP ── */}
        {tab==='register' && step===1 && (
          <>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div>
                <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>First Name</label>
                <input className="input" style={{marginTop:4}} placeholder="Aman"
                  value={form.firstName}
                  onChange={e=>setForm({...form,firstName:e.target.value})}/>
              </div>
              <div>
                <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>Last Name</label>
                <input className="input" style={{marginTop:4}} placeholder="Kumar"
                  value={form.lastName}
                  onChange={e=>setForm({...form,lastName:e.target.value})}/>
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>Email</label>
              <input className="input" style={{marginTop:4}} type="email"
                placeholder="you@email.com" value={form.email}
                onChange={e=>setForm({...form,email:e.target.value})}/>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>Password</label>
              <input className="input" style={{marginTop:4}} type="password"
                placeholder="••••••••" value={form.password}
                onChange={e=>setForm({...form,password:e.target.value})}/>
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>Phone (10 digits)</label>
              <input className="input" style={{marginTop:4}} placeholder="9876543210"
                value={form.phone} maxLength={10}
                onChange={e=>setForm({...form,phone:e.target.value.replace(/\D/,'').slice(0,10)})}/>
            </div>
            <button className="btn-primary" style={{width:'100%',padding:12,fontSize:15}}
              onClick={sendOtp} disabled={loading}>
              {loading?'Sending OTP...':'Send OTP to Email'}
            </button>
          </>
        )}

        {/* ── Register Step 2: Enter OTP ── */}
        {tab==='register' && step===2 && (
          <>
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:8}}>📧</div>
              <div style={{fontWeight:600,color:'#1e293b'}}>Check your email</div>
              <div style={{fontSize:13,color:'#64748b',marginTop:4}}>
                OTP sent to <strong>{form.email}</strong>
              </div>
              {timer>0 && (
                <div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>
                  Expires in {Math.floor(timer/60)}:{String(timer%60).padStart(2,'0')}
                </div>
              )}
            </div>

            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>Enter 6-digit OTP</label>
              <input className="input" style={{marginTop:4,fontSize:24,
                textAlign:'center',letterSpacing:8,fontWeight:700}}
                placeholder="000000" maxLength={6} value={form.otp}
                onChange={e=>setForm({...form,otp:e.target.value.replace(/\D/,'').slice(0,6)})}/>
            </div>

            <button className="btn-primary" style={{width:'100%',padding:12,fontSize:15,marginBottom:10}}
              onClick={verifyAndRegister} disabled={loading||form.otp.length!==6}>
              {loading?'Verifying...':'Verify OTP & Register'}
            </button>

            <button className="btn-secondary" style={{width:'100%',padding:10,fontSize:13}}
              onClick={()=>{setStep(1);setError('');setSuccess('');setForm({...form,otp:''});}}>
              ← Change Details
            </button>

            {timer===0 && (
              <button style={{width:'100%',padding:10,fontSize:13,marginTop:8,
                border:'none',background:'none',color:'#1e3a5f',cursor:'pointer',
                textDecoration:'underline'}}
                onClick={()=>{sendOtp();}}>
                Resend OTP
              </button>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── Sidebar ───────────────────────────────────────────────
function Sidebar({active, setPage, onLogout, user}) {
  const items = [
    {id:'dashboard', icon:'home', label:'Dashboard'},
    {id:'recharge',  icon:'recharge', label:'New Recharge'},
    {id:'history',   icon:'history', label:'Recharge History'},
    {id:'payments',  icon:'payment', label:'Transactions'},
    {id:'profile',   icon:'profile', label:'Profile'},
  ];
  return (
    <div className="sidebar" style={{display:'flex',flexDirection:'column',paddingTop:24}}>
      <div style={{padding:'0 20px 24px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
        <div style={{color:'white',fontSize:20,fontWeight:700}}>⚡ OmniCharge</div>
        <div style={{color:'#94a3b8',fontSize:12,marginTop:4}}>{user?.email}</div>
      </div>
      <div style={{flex:1,paddingTop:16}}>
        {items.map(item=>(
          <div key={item.id} className={`nav-item ${active===item.id?'active':''}`}
            onClick={()=>setPage(item.id)}>
            <Icon name={item.icon}/>
            <span>{item.label}</span>
          </div>
        ))}
      </div>
      <div style={{padding:'16px 8px',borderTop:'1px solid rgba(255,255,255,0.1)'}}>
        <div className="nav-item" onClick={onLogout}>
          <Icon name="logout"/>
          <span>Logout</span>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────
function Dashboard({auth, setPage, setRechargeData}) {
  const [recharges, setRecharges] = useState([]);
  const [stats, setStats] = useState({total:0,completed:0,pending:0,failed:0});
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    if(!auth?.userId) { setLoading(false); return; }
    api.getRecharges(auth.userId, auth.token)
      .then(data=>{
        const list = Array.isArray(data) ? data : [];
        setRecharges(list.slice(0,5));
        setStats({
          total: list.length,
          completed: list.filter(r=>r.status==='COMPLETED').length,
          pending: list.filter(r=>r.status==='PENDING').length,
          failed: list.filter(r=>r.status==='FAILED').length,
        });
      }).catch(()=>{}).finally(()=>setLoading(false));
  },[auth]);

  const StatusBadge = ({s}) => (
    <span className={`badge-${s==='COMPLETED'?'success':s==='PENDING'?'pending':'failed'}`}>
      {s}
    </span>
  );

  return (
    <div style={{padding:32}}>
      <div style={{marginBottom:28}}>
        <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b',margin:0}}>
          Welcome back, {auth?.firstName || 'User'}! 👋
        </h1>
        <p style={{color:'#64748b',marginTop:4}}>Here's your recharge overview</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:28}}>
        {[
          {label:'Total Recharges', value:stats.total, color:'#3b82f6'},
          {label:'Completed', value:stats.completed, color:'#22c55e'},
          {label:'Pending', value:stats.pending, color:'#f59e0b'},
          {label:'Failed', value:stats.failed, color:'#ef4444'},
        ].map(s=>(
          <div key={s.label} className="stat-card">
            <div style={{fontSize:28,fontWeight:700,color:s.color}}>{s.value}</div>
            <div style={{fontSize:13,color:'#64748b',marginTop:4}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20}}>
        <div className="card" style={{padding:24}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h2 style={{fontSize:16,fontWeight:700,color:'#1e293b',margin:0}}>Recent Recharges</h2>
            <button className="btn-secondary" style={{fontSize:12,padding:'6px 14px'}}
              onClick={()=>setPage('history')}>View All</button>
          </div>
          {loading ? <p style={{color:'#94a3b8'}}>Loading...</p>
          : recharges.length===0 ? <p style={{color:'#94a3b8'}}>No recharges yet</p>
          : recharges.map(r=>(
            <div key={r.id} style={{display:'flex',justifyContent:'space-between',
              alignItems:'center',padding:'12px 0',borderBottom:'1px solid #f1f5f9'}}>
              <div>
                <div style={{fontWeight:600,fontSize:14,color:'#1e293b'}}>
                  📱 {r.phoneNumber}
                </div>
                <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>
                  {r.createdAt ? new Date(r.createdAt).toLocaleDateString() : 'N/A'}
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontWeight:700,color:'#1e3a5f'}}>₹{r.amount}</div>
                <StatusBadge s={r.status}/>
              </div>
            </div>
          ))}
        </div>

        <div className="card" style={{padding:24}}>
          <h2 style={{fontSize:16,fontWeight:700,color:'#1e293b',marginBottom:16}}>Quick Actions</h2>
          <button className="btn-primary" style={{width:'100%',marginBottom:10,padding:12}}
            onClick={()=>setPage('recharge')}>
            📱 New Recharge
          </button>
          <button className="btn-secondary" style={{width:'100%',marginBottom:10,padding:12}}
            onClick={()=>setPage('history')}>
            📋 View History
          </button>
          <button className="btn-secondary" style={{width:'100%',padding:12}}
            onClick={()=>setPage('payments')}>
            💳 Transactions
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Recharge Screen ───────────────────────────────────────
function RechargeScreen({auth, onPayment}) {
  const [step, setStep] = useState(1);
  const [operators, setOperators] = useState([]);
  const [plans, setPlans] = useState([]);
  const [selectedOp, setSelectedOp] = useState(null);
  const [selectedPlan, setSelectedPlan] = useState(null);
  const [phone, setPhone] = useState('');
  const [recharge, setRecharge] = useState(null);
  const [paymentMethod, setPaymentMethod] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [result, setResult] = useState(null);

  useEffect(()=>{
    api.getOperators(auth.token).then(data=>{
      setOperators(Array.isArray(data)?data:[]);
    }).catch(()=>{});
  },[auth]);

  const loadPlans = (op) => {
    setSelectedOp(op); setSelectedPlan(null); setPlans([]);
    api.getPlans(op.id, auth.token).then(data=>{
      setPlans(Array.isArray(data)?data:[]);
    }).catch(()=>{});
  };

  const initiateRecharge = async () => {
    if(!phone||phone.length!==10){setError('Enter valid 10-digit phone number');return;}
    if(!selectedOp){setError('Select an operator');return;}
    if(!selectedPlan){setError('Select a plan');return;}
    setError(''); setLoading(true);
    try {
      const res = await api.initiateRecharge({
        userId: auth.userId, operatorId: selectedOp.id,
        planId: selectedPlan.id, phoneNumber: phone
      }, auth.token);
      if(res.id){ setRecharge(res); setStep(3); }
      else setError(res.error||'Failed to initiate recharge');
    } catch(e){ setError('Connection error'); }
    setLoading(false);
  };

  const processPayment = async () => {
    if(!paymentMethod){setError('Select a payment method');return;}
    setError(''); setLoading(true);
    try {
      const res = await api.processPayment({
        rechargeId: recharge.id, userId: auth.userId, paymentMethod
      }, auth.token);
      setResult(res);
      setStep(4);
      onPayment(res);
    } catch(e){ setError('Payment failed'); }
    setLoading(false);
  };

  const payMethods = [
    {id:'UPI', label:'UPI', icon:'📲', desc:'Google Pay, PhonePe, Paytm'},
    {id:'CREDIT_CARD', label:'Credit Card', icon:'💳', desc:'Visa, Mastercard'},
    {id:'DEBIT_CARD', label:'Debit Card', icon:'🏦', desc:'All bank debit cards'},
    {id:'NET_BANKING', label:'Net Banking', icon:'🏛️', desc:'All major banks'},
    {id:'WALLET', label:'Wallet', icon:'👜', desc:'OmniCharge wallet'},
  ];

  if(step===4 && result) return (
    <div style={{padding:32,display:'flex',alignItems:'center',justifyContent:'center',minHeight:'80vh'}}>
      <div className="card" style={{width:440,padding:40,textAlign:'center'}}>
        {result.status==='SUCCESS' ? (
          <>
            <div style={{fontSize:64,marginBottom:16}}>✅</div>
            <h2 style={{fontSize:22,fontWeight:700,color:'#166534',marginBottom:8}}>Recharge Successful!</h2>
            <p style={{color:'#64748b',marginBottom:24}}>Your recharge has been processed</p>
            <div style={{background:'#f8fafc',borderRadius:10,padding:20,textAlign:'left',marginBottom:24}}>
              {[
                ['Transaction ID', result.transactionRef],
                ['Amount', `₹${result.amount}`],
                ['Phone', recharge?.phoneNumber],
                ['Payment Method', result.paymentMethod],
                ['Status', result.status],
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',
                  padding:'6px 0',borderBottom:'1px solid #e2e8f0',fontSize:14}}>
                  <span style={{color:'#64748b'}}>{k}</span>
                  <span style={{fontWeight:600,color:'#1e293b'}}>{v}</span>
                </div>
              ))}
            </div>
          </>
        ) : (
          <>
            <div style={{fontSize:64,marginBottom:16}}>❌</div>
            <h2 style={{fontSize:22,fontWeight:700,color:'#991b1b',marginBottom:8}}>Payment Failed</h2>
            <p style={{color:'#64748b',marginBottom:24}}>{result.failureReason||'Something went wrong'}</p>
            <div style={{background:'#fef2f2',borderRadius:10,padding:16,marginBottom:24}}>
              <div style={{fontSize:24,fontWeight:700,color:'#ef4444'}}>₹{result.amount}</div>
            </div>
          </>
        )}
        <div style={{display:'flex',gap:10}}>
          <button className="btn-secondary" style={{flex:1}}
            onClick={()=>{setStep(1);setPhone('');setSelectedOp(null);setSelectedPlan(null);setResult(null);}}>
            New Recharge
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{padding:32}}>
      <h1 style={{fontSize:22,fontWeight:700,color:'#1e293b',marginBottom:24}}>📱 New Recharge</h1>

      {/* Step indicator */}
      <div style={{display:'flex',alignItems:'center',marginBottom:28}}>
        {['Phone & Operator','Select Plan','Payment'].map((s,i)=>(
          <React.Fragment key={s}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:28,height:28,borderRadius:'50%',display:'flex',
                alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,
                background:step>i+1?'#22c55e':step===i+1?'#1e3a5f':'#e2e8f0',
                color:step>=i+1?'white':'#94a3b8'}}>
                {step>i+1?'✓':i+1}
              </div>
              <span style={{fontSize:13,fontWeight:step===i+1?600:400,
                color:step===i+1?'#1e293b':'#94a3b8'}}>{s}</span>
            </div>
            {i<2 && <div style={{flex:1,height:2,background:step>i+1?'#22c55e':'#e2e8f0',margin:'0 12px'}}/>}
          </React.Fragment>
        ))}
      </div>

      {error && <div className="alert-error">{error}</div>}

      {/* Step 1 */}
      {step===1 && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
          <div className="card" style={{padding:24}}>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:16,color:'#1e293b'}}>Phone Number</h3>
            <input className="input" placeholder="Enter 10-digit mobile number"
              value={phone} maxLength={10}
              onChange={e=>setPhone(e.target.value.replace(/\D/,'').slice(0,10))}/>

            <h3 style={{fontSize:15,fontWeight:700,margin:'20px 0 12px',color:'#1e293b'}}>Select Operator</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {operators.map(op=>(
                <div key={op.id} className={`plan-card ${selectedOp?.id===op.id?'selected':''}`}
                  onClick={()=>loadPlans(op)} style={{textAlign:'center',padding:14}}>
                  <div style={{fontSize:20,marginBottom:4}}>
                    {op.code==='AIRTEL'?'🔴':op.code==='JIO'?'🔵':op.code==='VI'?'🟡':'📡'}
                  </div>
                  <div style={{fontWeight:600,fontSize:13,color:'#1e293b'}}>{op.name}</div>
                  <div style={{fontSize:11,color:'#94a3b8'}}>{op.code}</div>
                </div>
              ))}
            </div>
            <button className="btn-primary" style={{width:'100%',marginTop:20}}
              onClick={()=>{
                if(!phone||phone.length!==10){setError('Enter valid 10-digit number');return;}
                if(!selectedOp){setError('Select an operator');return;}
                setError(''); setStep(2);
              }}>
              Next →
            </button>
          </div>

          <div className="card" style={{padding:24}}>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:12,color:'#1e293b'}}>Available Plans</h3>
            {!selectedOp
              ? <p style={{color:'#94a3b8',fontSize:13}}>Select an operator to view plans</p>
              : plans.length===0
              ? <p style={{color:'#94a3b8',fontSize:13}}>No plans available</p>
              : plans.map(p=>(
                <div key={p.id} className={`plan-card ${selectedPlan?.id===p.id?'selected':''}`}
                  onClick={()=>setSelectedPlan(p)} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:15,color:'#1e3a5f'}}>₹{p.amount}</div>
                      <div style={{fontSize:12,color:'#64748b',marginTop:2}}>{p.name}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:12,color:'#475569'}}>{p.validityDays} days</div>
                      <div style={{fontSize:11,color:'#94a3b8'}}>{p.dataAllowance}</div>
                    </div>
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      )}

      {/* Step 2 */}
      {step===2 && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
          <div className="card" style={{padding:24}}>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:16,color:'#1e293b'}}>Choose Plan</h3>
            {plans.map(p=>(
              <div key={p.id} className={`plan-card ${selectedPlan?.id===p.id?'selected':''}`}
                onClick={()=>setSelectedPlan(p)} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:18,color:'#1e3a5f'}}>₹{p.amount}</div>
                    <div style={{fontSize:13,color:'#475569',marginTop:2}}>{p.name}</div>
                    {p.description && <div style={{fontSize:11,color:'#94a3b8'}}>{p.description}</div>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#475569'}}>{p.validityDays} days</div>
                    <div style={{fontSize:11,color:'#94a3b8'}}>{p.dataAllowance}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div className="card" style={{padding:24}}>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:16,color:'#1e293b'}}>Order Summary</h3>
            <div style={{background:'#f8fafc',borderRadius:10,padding:16,marginBottom:16}}>
              {[
                ['Phone', phone],
                ['Operator', selectedOp?.name],
                ['Plan', selectedPlan?.name || 'Not selected'],
                ['Amount', selectedPlan ? `₹${selectedPlan.amount}` : '-'],
                ['Validity', selectedPlan ? `${selectedPlan.validityDays} days` : '-'],
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',
                  padding:'6px 0',fontSize:13}}>
                  <span style={{color:'#64748b'}}>{k}</span>
                  <span style={{fontWeight:600,color:'#1e293b'}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn-secondary" style={{flex:1}} onClick={()=>setStep(1)}>← Back</button>
              <button className="btn-primary" style={{flex:2}}
                onClick={initiateRecharge} disabled={loading||!selectedPlan}>
                {loading?'Processing...':'Proceed to Pay'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Step 3 — Payment */}
      {step===3 && recharge && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
          <div className="card" style={{padding:24}}>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:16,color:'#1e293b'}}>Payment Method</h3>
            {payMethods.map(pm=>(
              <div key={pm.id} className={`payment-option ${paymentMethod===pm.id?'selected':''}`}
                onClick={()=>setPaymentMethod(pm.id)}>
                <span style={{fontSize:20}}>{pm.icon}</span>
                <div>
                  <div style={{fontWeight:600,fontSize:14,color:'#1e293b'}}>{pm.label}</div>
                  <div style={{fontSize:11,color:'#94a3b8'}}>{pm.desc}</div>
                </div>
                <div style={{marginLeft:'auto'}}>
                  <div style={{width:18,height:18,borderRadius:'50%',border:'2px solid',
                    borderColor:paymentMethod===pm.id?'#1e3a5f':'#cbd5e1',
                    background:paymentMethod===pm.id?'#1e3a5f':'white',
                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {paymentMethod===pm.id && <div style={{width:8,height:8,borderRadius:'50%',background:'white'}}/>}
                  </div>
                </div>
              </div>
            ))}
          </div>

          <div className="card" style={{padding:24}}>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:16,color:'#1e293b'}}>Payment Summary</h3>
            <div style={{background:'#f8fafc',borderRadius:10,padding:16,marginBottom:20}}>
              {[
                ['Recharge ID', `#${recharge.id}`],
                ['Phone', recharge.phoneNumber],
                ['Amount', `₹${recharge.amount}`],
                ['Status', recharge.status],
              ].map(([k,v])=>(
                <div key={k} style={{display:'flex',justifyContent:'space-between',
                  padding:'8px 0',borderBottom:'1px solid #e2e8f0',fontSize:14}}>
                  <span style={{color:'#64748b'}}>{k}</span>
                  <span style={{fontWeight:600,color:'#1e293b'}}>{v}</span>
                </div>
              ))}
              <div style={{display:'flex',justifyContent:'space-between',
                padding:'12px 0 0',fontSize:18,fontWeight:700}}>
                <span style={{color:'#1e293b'}}>Total</span>
                <span style={{color:'#1e3a5f'}}>₹{recharge.amount}</span>
              </div>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn-secondary" style={{flex:1}} onClick={()=>setStep(2)}>← Back</button>
              <button className="btn-primary" style={{flex:2,padding:14,fontSize:15}}
                onClick={processPayment} disabled={loading||!paymentMethod}>
                {loading?'Processing...':`Pay ₹${recharge.amount}`}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── History Screen ────────────────────────────────────────
function HistoryScreen({auth}) {
  const [recharges, setRecharges] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('ALL');

  useEffect(()=>{
    if(!auth?.userId) { setLoading(false); return; }
    api.getRecharges(auth.userId, auth.token)
      .then(data=>setRecharges(Array.isArray(data)?data:[]))
      .catch(()=>{})
      .finally(()=>setLoading(false));
  },[auth]);

  const filtered = filter==='ALL' ? recharges
    : recharges.filter(r=>r.status===filter);

  return (
    <div style={{padding:32}}>
      <h1 style={{fontSize:22,fontWeight:700,color:'#1e293b',marginBottom:20}}>📋 Recharge History</h1>

      <div style={{display:'flex',gap:8,marginBottom:20}}>
        {['ALL','COMPLETED','PENDING','FAILED'].map(f=>(
          <button key={f} className={`tab ${filter===f?'active':''}`}
            style={{border:'none',background:filter===f?'#1e3a5f':'#e2e8f0',
              color:filter===f?'white':'#475569'}}
            onClick={()=>setFilter(f)}>{f}</button>
        ))}
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#f8fafc'}}>
              {['ID','Phone','Operator','Amount','Status','Date'].map(h=>(
                <th key={h} style={{padding:'12px 16px',textAlign:'left',
                  fontSize:12,fontWeight:700,color:'#64748b',textTransform:'uppercase'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {loading ? (
              <tr><td colSpan={6} style={{padding:24,textAlign:'center',color:'#94a3b8'}}>Loading...</td></tr>
            ) : filtered.length===0 ? (
              <tr><td colSpan={6} style={{padding:24,textAlign:'center',color:'#94a3b8'}}>No records found</td></tr>
            ) : filtered.map(r=>(
              <tr key={r.id} style={{borderTop:'1px solid #f1f5f9'}}>
                <td style={{padding:'12px 16px',fontSize:13,color:'#64748b'}}>#{r.id}</td>
                <td style={{padding:'12px 16px',fontWeight:600,fontSize:14}}>📱 {r.phoneNumber}</td>
                <td style={{padding:'12px 16px',fontSize:13,color:'#475569'}}>#{r.operatorId}</td>
                <td style={{padding:'12px 16px',fontWeight:700,color:'#1e3a5f'}}>₹{r.amount}</td>
                <td style={{padding:'12px 16px'}}>
                  <span className={`badge-${r.status==='COMPLETED'?'success':r.status==='PENDING'?'pending':'failed'}`}>
                    {r.status}
                  </span>
                </td>
                <td style={{padding:'12px 16px',fontSize:12,color:'#94a3b8'}}>
                  {r.createdAt ? new Date(r.createdAt).toLocaleString() : 'N/A'}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Admin Dashboard ───────────────────────────────────────
function AdminDashboard({auth, setPage}) {
  const [stats, setStats] = useState({users:0,recharges:0,payments:0,revenue:0});
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    Promise.all([
      api.getAllUsers(auth.token).catch(()=>[]),
      api.getAllRecharges(auth.token).catch(()=>[]),
      api.getAllPayments(auth.token).catch(()=>[]),
    ]).then(([users,recharges,payments])=>{
      const userList = Array.isArray(users) ? users : [];
      const rechargeList = Array.isArray(recharges) ? recharges : [];
      const paymentList = Array.isArray(payments) ? payments : [];
      const revenue = paymentList
        .filter(p=>p.status==='SUCCESS')
        .reduce((sum,p)=>sum+parseFloat(p.amount||0),0);
      setStats({
        users: userList.length,
        recharges: rechargeList.length,
        payments: paymentList.length,
        revenue: revenue.toFixed(2),
      });
    }).finally(()=>setLoading(false));
  },[auth]);

  return (
    <div style={{padding:32}}>
      <div style={{marginBottom:28}}>
        <h1 style={{fontSize:24,fontWeight:700,color:'#1e293b',margin:0}}>
          Admin Dashboard 🛡️
        </h1>
        <p style={{color:'#64748b',marginTop:4}}>Platform overview</p>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:28}}>
        {[
          {label:'Total Users', value:stats.users, color:'#3b82f6', icon:'👤'},
          {label:'Total Recharges', value:stats.recharges, color:'#8b5cf6', icon:'📱'},
          {label:'Total Payments', value:stats.payments, color:'#22c55e', icon:'💳'},
          {label:'Total Revenue', value:`₹${stats.revenue}`, color:'#f59e0b', icon:'💰'},
        ].map(s=>(
          <div key={s.label} className="stat-card">
            <div style={{fontSize:24,marginBottom:8}}>{s.icon}</div>
            <div style={{fontSize:28,fontWeight:700,color:s.color}}>{s.value}</div>
            <div style={{fontSize:13,color:'#64748b',marginTop:4}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {[
          {id:'allUsers', label:'Manage Users', icon:'👤', desc:'View all registered users'},
          {id:'allRecharges', label:'All Recharges', icon:'📱', desc:'View all recharge records'},
          {id:'manageOperators', label:'Manage Operators', icon:'📡', desc:'Add operators and plans'},
        ].map(item=>(

        ))}

    </div>
  );

// ── All Users Screen ──────────────────────────────────────
function AllUsersScreen({auth}) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');

  useEffect(()=>{
    api.getAllUsers(auth.token)
      .then(data=>setUsers(Array.isArray(data)?data:[]))
      .catch(()=>{})
      .finally(()=>setLoading(false));
  },[auth]);

  const filtered = users.filter(u=>
    u.email?.toLowerCase().includes(search.toLowerCase()) ||
    u.firstName?.toLowerCase().includes(search.toLowerCase()) ||

  return (
    <div style={{padding:32}}>

          placeholder="🔍 Search by email, name or phone..."

      </div>
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead>
            <tr style={{background:'#f8fafc'}}>
              {['ID','Name','Email','Phone','Role','Joined'].map(h=>(
                <th key={h} style={{padding:'12px 16px',textAlign:'left',
                  fontSize:12,fontWeight:700,color:'#64748b',textTransform:'uppercase'}}>{h}</th>
              ))}

          <tbody>
            {loading ? (
              <tr><td colSpan={6} style={{padding:24,textAlign:'center',color:'#94a3b8'}}>Loading...</td></tr>
            ) : filtered.length===0 ? (
              <tr><td colSpan={6} style={{padding:24,textAlign:'center',color:'#94a3b8'}}>No users found</td></tr>
            ) : filtered.map(u=>(

                <td style={{padding:'12px 16px'}}>

                    borderRadius:20,padding:'2px 10px',fontSize:12,fontWeight:600}}>
                    {u.role}
                  </span>
                </td>
                <td style={{padding:'12px 16px',fontSize:12,color:'#94a3b8'}}>

              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Manage Operators Screen ───────────────────────────────
function ManageOperatorsScreen({auth}) {
  const [operators, setOperators] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAddOp, setShowAddOp] = useState(false);
  const [showAddPlan, setShowAddPlan] = useState(null);
  const [opForm, setOpForm] = useState({name:'',code:'',logoUrl:''});
  const [planForm, setPlanForm] = useState({name:'',amount:'',validityDays:'',dataAllowance:'',description:''});
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');

  const load = () => {
    api.getAllOperators(auth.token)
      .then(data=>setOperators(Array.isArray(data)?data:[]))
      .catch(()=>{})
      .finally(()=>setLoading(false));
  };

  useEffect(()=>{ load(); },[auth]);

  const addOperator = async () => {
    setError(''); setSuccess('');
    if(!opForm.name||!opForm.code){setError('Name and Code are required');return;}
    try {
      const res = await api.createOperator(opForm, auth.token);
      if(res.id){ setSuccess('Operator created!'); setOpForm({name:'',code:'',logoUrl:''}); setShowAddOp(false); load(); }
      else setError(res.error||'Failed to create operator');
    } catch(e){ setError('Connection error'); }
  };

  const addPlan = async (operatorId) => {
    setError(''); setSuccess('');
    if(!planForm.name||!planForm.amount||!planForm.validityDays){setError('Name, amount and validity are required');return;}
    try {
      const res = await api.createPlan(operatorId, {
        ...planForm,
        amount: parseFloat(planForm.amount),
        validityDays: parseInt(planForm.validityDays)
      }, auth.token);
      if(res.id){ setSuccess('Plan created!'); setPlanForm({name:'',amount:'',validityDays:'',dataAllowance:'',description:''}); setShowAddPlan(null); load(); }
      else setError(res.error||'Failed to create plan');
    } catch(e){ setError('Connection error'); }
  };

  return (
    <div style={{padding:32}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h1 style={{fontSize:22,fontWeight:700,color:'#1e293b',margin:0}}>📡 Manage Operators</h1>
        <button className="btn-primary" onClick={()=>setShowAddOp(!showAddOp)}>
          + Add Operator
        </button>
      </div>

      {error && <div className="alert-error">{error}</div>}
      {success && <div className="alert-success">{success}</div>}

      {showAddOp && (
        <div className="card" style={{padding:24,marginBottom:20}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16,color:'#1e293b'}}>New Operator</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}}>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>Name *</label>
              <input className="input" style={{marginTop:4}} placeholder="Airtel"
                value={opForm.name} onChange={e=>setOpForm({...opForm,name:e.target.value})}/>
            </div>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>Code *</label>
              <input className="input" style={{marginTop:4}} placeholder="AIRTEL"
                value={opForm.code} onChange={e=>setOpForm({...opForm,code:e.target.value.toUpperCase()})}/>
            </div>
            <div>
              <label style={{fontSize:12,fontWeight:600,color:'#475569'}}>Logo URL</label>
              <input className="input" style={{marginTop:4}} placeholder="http://..."
                value={opForm.logoUrl} onChange={e=>setOpForm({...opForm,logoUrl:e.target.value})}/>
            </div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn-primary" onClick={addOperator}>Create Operator</button>
            <button className="btn-secondary" onClick={()=>setShowAddOp(false)}>Cancel</button>
          </div>
        </div>
      )}

      {loading ? <p style={{color:'#94a3b8'}}>Loading...</p>
      : operators.map(op=>(
        <div key={op.id} className="card" style={{padding:24,marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div>
              <div style={{fontWeight:700,fontSize:16,color:'#1e293b'}}>
                {op.code==='AIRTEL'?'🔴':op.code==='JIO'?'🔵':op.code==='VI'?'🟡':'📡'} {op.name}
              </div>
              <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>Code: {op.code} | Status: {op.status}</div>
            </div>
            <button className="btn-secondary" style={{fontSize:12,padding:'6px 14px'}}
              onClick={()=>setShowAddPlan(showAddPlan===op.id?null:op.id)}>
              + Add Plan
            </button>
          </div>

          {showAddPlan===op.id && (
            <div style={{background:'#f8fafc',borderRadius:10,padding:16,marginBottom:16}}>
              <h4 style={{fontSize:13,fontWeight:700,marginBottom:12,color:'#1e293b'}}>New Plan for {op.name}</h4>
              <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,marginBottom:10}}>
                {[
                  ['Name *','text','Airtel 299','name'],
                  ['Amount *','number','299','amount'],
                  ['Validity (days) *','number','28','validityDays'],
                  ['Data Allowance','text','1.5GB/day','dataAllowance'],
                  ['Description','text','Best plan','description'],
                ].map(([label,type,ph,key])=>(
                  <div key={key}>
                    <label style={{fontSize:11,fontWeight:600,color:'#475569'}}>{label}</label>
                    <input className="input" style={{marginTop:4,fontSize:13}} type={type}
                      placeholder={ph} value={planForm[key]}
                      onChange={e=>setPlanForm({...planForm,[key]:e.target.value})}/>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn-primary" style={{fontSize:13}}
                  onClick={()=>addPlan(op.id)}>Create Plan</button>
                <button className="btn-secondary" style={{fontSize:13}}
                  onClick={()=>setShowAddPlan(null)}>Cancel</button>
              </div>
            </div>
          )}

          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {(op.plans||[]).map(p=>(
              <div key={p.id} style={{background:'#f8fafc',borderRadius:8,padding:12}}>
                <div style={{fontWeight:700,color:'#1e3a5f'}}>₹{p.amount}</div>
                <div style={{fontSize:12,color:'#475569'}}>{p.name}</div>
                <div style={{fontSize:11,color:'#94a3b8'}}>{p.validityDays} days · {p.dataAllowance}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [auth, setAuth] = useState(null);
  const [page, setPage] = useState('dashboard');

  const handleLogin = (res) => {
    const isAdmin = res.role === 'ADMIN';
    setAuth({
      token: res.token,
      email: res.email,
      role: res.role,
      userId: res.userId,
      firstName: res.firstName || res.email?.split('@')[0],
      lastName: res.lastName || '',
      isAdmin,
    });
    setPage(isAdmin ? 'adminDashboard' : 'dashboard');
  };

  const handleLogout = () => {
    setAuth(null);
    setPage('dashboard');
  };

  if(!auth) return <AuthScreen onLogin={handleLogin}/>;

  // ── Admin view ──────────────────────────────────
  if(auth.isAdmin) {
    const adminPages = {
      adminDashboard: <AdminDashboard auth={auth} setPage={setPage}/>,
      allUsers:       <AllUsersScreen auth={auth}/>,
      allRecharges:   <AllRechargesScreen auth={auth}/>,
      allPayments:    <AllPaymentsScreen auth={auth}/>,
      manageOperators:<ManageOperatorsScreen auth={auth}/>,
    };
    return (
      <div style={{display:'flex',minHeight:'100vh'}}>
        <AdminSidebar active={page} setPage={setPage}
          onLogout={handleLogout} user={auth}/>
        <div style={{flex:1,overflowY:'auto'}}>
          {adminPages[page] || adminPages.adminDashboard}
        </div>
      </div>
    );
  }

  // ── User view ───────────────────────────────────
  const pages = {
    dashboard: <Dashboard auth={auth} setPage={setPage} setRechargeData={()=>{}}/>,
    recharge:  <RechargeScreen auth={auth} onPayment={()=>setPage('payments')}/>,
    history:   <HistoryScreen auth={auth}/>,
    payments:  <TransactionsScreen auth={auth}/>,
    profile:   <ProfileScreen auth={auth}/>,
  };
  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar active={page} setPage={setPage}
        onLogout={handleLogout} user={auth}/>
      <div style={{flex:1,overflowY:'auto'}}>
        {pages[page] || pages.dashboard}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
