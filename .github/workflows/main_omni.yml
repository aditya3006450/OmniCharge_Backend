# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
name: Build and deploy container app to Azure Web App - omni

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs
        run: |
          mvn -f DiscoveryServer/pom.xml clean package -DskipTests -B
          mvn -f ConfigServer/pom.xml clean package -DskipTests -B
          mvn -f ApiGateway/pom.xml clean package -DskipTests -B
          mvn -f UserService/pom.xml clean package -DskipTests -B
          mvn -f NotificationService/pom.xml clean package -DskipTests -B
          mvn -f PaymentService/pom.xml clean package -DskipTests -B
          mvn -f RechargeService/pom.xml clean package -DskipTests -B
          mvn -f OperatoraService/pom.xml clean package -DskipTests -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: omnicharge.azurecr.io
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C3DF1405816540C29F75844C16D1CCB0 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_D0ABAEF9B54846559BE35953479F9115 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: omnicharge.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C3DF1405816540C29F75844C16D1CCB0 }}/omni:${{ github.sha }}
          file: ./Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    needs: build

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DF4258952CC34C30924361ECDA3A1356 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F0F0E3EC2DAA4785BC19493F09B801FE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D52231D005C34B02B0898C0C52A433C9 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'omni'
          slot-name: 'Production'
          images: 'omnicharge.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_C3DF1405816540C29F75844C16D1CCB0 }}/omni:${{ github.sha }}'
